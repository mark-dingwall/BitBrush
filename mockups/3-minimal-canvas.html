<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitBrush - Minimal Canvas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #999;
      font-family: ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", Menlo, monospace;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* --- Canvas fills everything --- */
    #canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas-area canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    /* --- Floating sidebar: appears on right edge --- */
    #sidebar {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 160px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    #sidebar:hover {
      opacity: 1;
    }

    .panel {
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      padding: 10px;
    }

    /* --- Status --- */
    .status-line {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #666;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0a0;
      flex-shrink: 0;
    }

    /* --- Bank + coords on one panel --- */
    .info {
      font-size: 12px;
      color: #777;
      line-height: 1.6;
    }

    .info .balance {
      color: #aaa;
      font-size: 14px;
    }

    /* --- Palette --- */
    #palette {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1px;
    }

    .swatch {
      aspect-ratio: 1;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 2px;
      transition: border-color 0.1s;
    }

    .swatch:hover {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .swatch.active {
      border-color: #fff;
    }

    /* --- Button --- */
    .btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      color: #777;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 6px;
      text-align: center;
      transition: all 0.15s;
      width: 100%;
    }

    .btn:hover {
      border-color: rgba(255, 255, 255, 0.25);
      color: #ccc;
    }

    /* --- Stats --- */
    .stats {
      font-size: 12px;
      color: #666;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 2px;
    }

    .stat-swatch {
      width: 8px;
      height: 8px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* --- Floating coords (bottom-left) --- */
    #coords-float {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 12px;
      color: #444;
      opacity: 0.6;
    }

    /* --- Variant badge --- */
    .variant-badge {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 6px 20px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      color: #666;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="variant-badge">3/3 &mdash; Minimal Canvas</div>

  <div id="canvas-area">
    <canvas id="canvas"></canvas>

    <div id="sidebar">
      <div class="panel">
        <div class="status-line">
          <div class="status-dot"></div>
          <span>3 online</span>
        </div>
      </div>

      <div class="panel">
        <div class="info">
          <span class="balance">12/25</span> px &middot; next 2s
        </div>
      </div>

      <div class="panel">
        <div id="palette"></div>
      </div>

      <div class="panel">
        <button class="btn">Export</button>
      </div>

      <div class="panel">
        <div class="stats">
          <div style="margin-bottom: 3px; color: #888;">1,247 placed</div>
          <div class="stat-row"><div class="stat-swatch" style="background:#FF0000;"></div><span>342</span></div>
          <div class="stat-row"><div class="stat-swatch" style="background:#0066FF;"></div><span>287</span></div>
          <div class="stat-row"><div class="stat-swatch" style="background:#00CC00;"></div><span>198</span></div>
          <div class="stat-row"><div class="stat-swatch" style="background:#FFCC00;"></div><span>156</span></div>
          <div class="stat-row"><div class="stat-swatch" style="background:#FF00FF;"></div><span>112</span></div>
        </div>
      </div>
    </div>

    <div id="coords-float">142, 87 &middot; 4x</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw fake pixel art centered
    const SCALE = 2;
    const W = 250, H = 250;
    const offsetX = Math.floor((canvas.width - W * SCALE) / 2);
    const offsetY = Math.floor((canvas.height - H * SCALE) / 2);

    let seed = 42;
    function rand() { seed = (seed * 16807 + 0) % 2147483647; return seed / 2147483647; }

    const colors = ['#FF0000','#0066FF','#00CC00','#FFCC00','#FF00FF','#00CCCC','#FF6600','#9933FF','#FFFFFF','#666666'];
    for (let i = 0; i < 1200; i++) {
      const x = Math.floor(rand() * W);
      const y = Math.floor(rand() * H);
      ctx.fillStyle = colors[Math.floor(rand() * colors.length)];
      ctx.fillRect(offsetX + x * SCALE, offsetY + y * SCALE, SCALE, SCALE);
    }

    // Subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= W; x++) {
      const sx = offsetX + x * SCALE;
      ctx.beginPath(); ctx.moveTo(sx, offsetY); ctx.lineTo(sx, offsetY + H * SCALE); ctx.stroke();
    }
    for (let y = 0; y <= H; y++) {
      const sy = offsetY + y * SCALE;
      ctx.beginPath(); ctx.moveTo(offsetX, sy); ctx.lineTo(offsetX + W * SCALE, sy); ctx.stroke();
    }

    // Canvas border hint
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    ctx.strokeRect(offsetX, offsetY, W * SCALE, H * SCALE);

    // Palette
    const WEBSAFE = [0x00, 0x33, 0x66, 0x99, 0xCC, 0xFF];
    const paletteEl = document.getElementById('palette');
    let activeSwatch = null;

    const subset = [];
    for (let r = 0; r < 6; r++) {
      for (let g = 0; g < 6; g++) {
        subset.push('#' + WEBSAFE[r].toString(16).padStart(2,'0') + WEBSAFE[g].toString(16).padStart(2,'0') + 'FF');
      }
    }

    subset.forEach((hex, i) => {
      const s = document.createElement('div');
      s.className = 'swatch' + (i === 5 ? ' active' : '');
      s.style.backgroundColor = hex;
      if (i === 5) activeSwatch = s;
      s.onclick = () => {
        if (activeSwatch) activeSwatch.classList.remove('active');
        s.classList.add('active');
        activeSwatch = s;
      };
      paletteEl.appendChild(s);
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
