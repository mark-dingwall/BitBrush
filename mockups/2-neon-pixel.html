<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <title>BitBrush - Neon Pixel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: "VT323", monospace;
      font-size: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    #app {
      display: flex;
      gap: 3px;
      align-items: flex-start;
      background: #1a1a1a;
      border: 2px solid #333;
      padding: 3px;
    }

    /* --- Canvas area --- */
    #canvas-area {
      position: relative;
      width: 500px;
      height: 500px;
      flex-shrink: 0;
      border: 2px solid #0ff;
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.15), inset 0 0 12px rgba(0, 255, 255, 0.05);
    }

    #canvas-area canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    /* --- Sidebar: sharp pixel panels --- */
    #sidebar {
      width: 200px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }

    .panel {
      background: #111;
      border: 1px solid #333;
      padding: 10px;
    }

    .panel:hover {
      border-color: #555;
    }

    /* --- Title --- */
    #title {
      font-size: 28px;
      color: #0ff;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.2);
      text-align: center;
      padding: 6px 0;
    }

    /* --- Status line --- */
    .status-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 18px;
      color: #0f0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #0f0;
      flex-shrink: 0;
      box-shadow: 0 0 6px #0f0;
    }

    /* --- Bank --- */
    .bank {
      font-size: 18px;
      color: #aaa;
    }

    .bank-balance {
      color: #ff0;
      font-size: 24px;
      text-shadow: 0 0 8px rgba(255, 255, 0, 0.4);
    }

    /* --- Coords --- */
    .coords {
      font-size: 16px;
      color: #0f0;
      font-variant-numeric: tabular-nums;
    }

    /* --- Section labels --- */
    .label {
      font-size: 16px;
      color: #f0f;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 6px rgba(255, 0, 255, 0.4);
      margin-bottom: 4px;
    }

    /* --- Palette --- */
    #palette {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1px;
    }

    .swatch {
      aspect-ratio: 1;
      cursor: pointer;
      border: 1px solid #222;
      transition: box-shadow 0.15s;
    }

    .swatch:hover {
      border-color: #fff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      z-index: 1;
    }

    .swatch.active {
      border: 2px solid #fff;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
    }

    /* --- Export button --- */
    .btn {
      background: #111;
      border: 2px solid #0ff;
      color: #0ff;
      cursor: pointer;
      font-family: "VT323", monospace;
      font-size: 18px;
      padding: 8px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.4);
    }

    /* --- Stats --- */
    .stats {
      font-size: 18px;
      color: #aaa;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .stat-swatch {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .stat-count {
      font-size: 16px;
      color: #888;
    }

    /* --- Variant badge --- */
    .variant-badge {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.4);
      padding: 6px 20px;
      font-family: "VT323", monospace;
      font-size: 18px;
      color: #0ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: 1001;
    }
  </style>
</head>
<body>

  <div class="variant-badge">2/3 &mdash; Neon Pixel</div>

  <div id="app">
    <div id="canvas-area">
      <canvas id="canvas" width="500" height="500"></canvas>
    </div>
    <div id="sidebar">
      <div class="panel">
        <div id="title">BitBrush</div>
      </div>

      <div class="panel">
        <div class="status-line">
          <div class="status-dot"></div>
          <span>3 ONLINE</span>
        </div>
      </div>

      <div class="panel">
        <div class="bank">
          <span class="bank-balance">12/25</span> PIXELS<br>
          NEXT IN 2S
        </div>
      </div>

      <div class="panel">
        <div class="coords">X:142 Y:087 Z:4X</div>
      </div>

      <div class="panel">
        <div class="label">Colors</div>
        <div id="palette"></div>
      </div>

      <div class="panel">
        <button class="btn">Export PNG</button>
      </div>

      <div class="panel">
        <div class="label">Stats</div>
        <div class="stats">
          <div style="margin-bottom: 4px; color: #ff0;">1,247 PX</div>
          <div class="stat-row"><div class="stat-swatch" style="background:#FF0000;"></div><span class="stat-count">342</span></div>
          <div class="stat-row"><div class="stat-swatch" style="background:#0066FF;"></div><span class="stat-count">287</span></div>
          <div class="stat-row"><div class="stat-swatch" style="background:#00CC00;"></div><span class="stat-count">198</span></div>
          <div class="stat-row"><div class="stat-swatch" style="background:#FFCC00;"></div><span class="stat-count">156</span></div>
          <div class="stat-row"><div class="stat-swatch" style="background:#FF00FF;"></div><span class="stat-count">112</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, 500, 500);

    let seed = 42;
    function rand() { seed = (seed * 16807 + 0) % 2147483647; return seed / 2147483647; }

    const colors = ['#FF0000','#0066FF','#00CC00','#FFCC00','#FF00FF','#00CCCC','#FF6600','#9933FF','#FFFFFF','#666666'];
    for (let i = 0; i < 1200; i++) {
      const x = Math.floor(rand() * 250);
      const y = Math.floor(rand() * 250);
      ctx.fillStyle = colors[Math.floor(rand() * colors.length)];
      ctx.fillRect(x * 2, y * 2, 2, 2);
    }

    ctx.strokeStyle = 'rgba(0,255,255,0.06)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= 500; x += 2) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 500); ctx.stroke();
    }
    for (let y = 0; y <= 500; y += 2) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(500, y); ctx.stroke();
    }

    // Palette
    const WEBSAFE = [0x00, 0x33, 0x66, 0x99, 0xCC, 0xFF];
    const paletteEl = document.getElementById('palette');
    let activeSwatch = null;

    const subset = [];
    for (let r = 0; r < 6; r++) {
      for (let g = 0; g < 6; g++) {
        subset.push('#' + WEBSAFE[r].toString(16).padStart(2,'0') + WEBSAFE[g].toString(16).padStart(2,'0') + 'FF');
      }
    }

    subset.forEach((hex, i) => {
      const s = document.createElement('div');
      s.className = 'swatch' + (i === 5 ? ' active' : '');
      s.style.backgroundColor = hex;
      if (i === 5) activeSwatch = s;
      s.onclick = () => {
        if (activeSwatch) activeSwatch.classList.remove('active');
        s.classList.add('active');
        activeSwatch = s;
      };
      paletteEl.appendChild(s);
    });
  </script>
</body>
</html>
