    let selectedPaletteIndex = 0; // set to first chromatic color during palette init

    // ── Bank state ─────────────────────────────────────────────────────────────
    let localBalance = 5;       // updated by server push; starts at STARTING_BALANCE
    let localMaxBalance = 25;   // updated by server push
    // countdownTimer replaced by bankProgressInterval (progress bar)

    // ── HSL conversion and sorting ──────────────────────────────────────────
    function hexToHsl(hex) {
      let r = parseInt(hex.slice(1, 3), 16) / 255;
      let g = parseInt(hex.slice(3, 5), 16) / 255;
      let b = parseInt(hex.slice(5, 7), 16) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return [h * 360, s * 100, l * 100];
    }

    function isLightColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return (r + g + b) / 3 > 204;
    }

    function sortPaletteByHsl(palette) {
      const withHsl = palette.map((hex, i) => ({
        hex, originalIndex: i, hsl: hexToHsl(hex)
      }));
      // Achromatic: saturation === 0 (pure grays, black, white)
      const achromatic = withHsl.filter(c => c.hsl[1] === 0);
      // Near-achromatic: very low saturation, looks gray-ish
      const nearAchromatic = withHsl.filter(c => c.hsl[1] > 0 && c.hsl[1] <= 15);
      const chromatic = withHsl.filter(c => c.hsl[1] > 15);

      achromatic.sort((a, b) => a.hsl[2] - b.hsl[2]);
      nearAchromatic.sort((a, b) => a.hsl[2] - b.hsl[2]);

      // Sort chromatic by hue bins (30-degree bands) then by lightness within each bin
      // This creates smooth rainbow rows: red -> orange -> yellow -> green -> cyan -> blue -> purple -> pink
      chromatic.sort((a, b) => {
        const hueBinA = Math.floor(a.hsl[0] / 30);
        const hueBinB = Math.floor(b.hsl[0] / 30);
        if (hueBinA !== hueBinB) return hueBinA - hueBinB;
        // Within same hue bin, sort by lightness (dark to light)
        return a.hsl[2] - b.hsl[2];
      });

      const eraser = withHsl.filter(c => c.originalIndex === 0);
      const achromaticNoEraser = achromatic.filter(c => c.originalIndex !== 0);
      return [...chromatic, ...nearAchromatic, ...achromaticNoEraser, ...eraser];
    }

    // ── Recently-used colors (memory only, no localStorage) ──────────────────
    const recentColors = [];

    function addRecentColor(hex) {
      const idx = recentColors.indexOf(hex);
      if (idx !== -1) recentColors.splice(idx, 1);
      recentColors.unshift(hex);
      if (recentColors.length > 6) recentColors.pop();
      renderRecentColors();
    }

    function renderRecentColors() {
      const container = document.getElementById('recent-colors');
      container.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const el = document.createElement('div');
        if (i < recentColors.length) {
          const hex = recentColors[i];
          el.className = 'recent-swatch';
          el.style.backgroundColor = hex;
          el.title = hex;
          el.addEventListener('click', () => {
            const origIdx = PALETTE.indexOf(hex);
            if (origIdx !== -1) {
              selectColor(origIdx, hex);
            }
          });
        } else {
          el.className = 'recent-swatch empty';
        }
        container.appendChild(el);
      }
    }

    // ── Color preview ────────────────────────────────────────────────────────
    function updateColorPreview(hex) {
      const swatch = document.getElementById('color-preview-swatch');
      const hexLabel = document.getElementById('color-preview-hex');
      if (selectedPaletteIndex === 0) {
        swatch.style.backgroundColor = '#1a1a1a';
        swatch.style.borderColor = '#ff4444';
        hexLabel.textContent = 'Eraser';
      } else {
        swatch.style.backgroundColor = hex;
        if (isLightColor(hex)) {
          swatch.style.borderColor = '#000000';
        } else {
          swatch.style.borderColor = '#ffffff';
        }
        hexLabel.textContent = hex;
      }
    }

    // ── Unified color selection ──────────────────────────────────────────────
    function selectColor(paletteIndex, hex) {
      if (activeSwatch) {
        activeSwatch.classList.remove('active');
        activeSwatch.style.borderColor = 'transparent';
        activeSwatch.style.boxShadow = '';
      }
      const newActive = paletteEl.querySelector('[data-palette-index="' + paletteIndex + '"]');
      if (newActive) {
        newActive.classList.add('active');
        if (paletteIndex === 0) {
          newActive.style.borderColor = '#ff4444';
          newActive.style.boxShadow = '0 0 8px rgba(255, 68, 68, 0.3)';
        } else if (isLightColor(hex)) {
          // Light colors: black border instead of cyan glow (cyan invisible on white)
          newActive.style.borderColor = '#000000';
          newActive.style.boxShadow = '0 0 6px rgba(0, 0, 0, 0.4)';
        } else {
          newActive.style.borderColor = '#ffffff';
          newActive.style.boxShadow = '0 0 8px rgba(0, 204, 204, 0.3)';
        }
        activeSwatch = newActive;
      }
      selectedPaletteIndex = paletteIndex;
      updateColorPreview(hex);
      if (paletteIndex !== 0) addRecentColor(hex);
      updateDrawerStrip();
    }

    // ── Palette grid (HSL sorted) ────────────────────────────────────────────
    const paletteEl = document.getElementById('palette');
    let activeSwatch = null;

    const sortedPalette = sortPaletteByHsl(PALETTE);

    sortedPalette.forEach((item) => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      if (item.originalIndex === 0) {
        swatch.classList.add('eraser-swatch');
        swatch.title = 'Eraser';
        swatch.setAttribute('aria-label', 'Eraser tool');
      } else {
        swatch.style.backgroundColor = item.hex;
        swatch.title = item.hex;
        swatch.setAttribute('aria-label', 'Color ' + item.hex);
      }
      swatch.setAttribute('data-palette-index', item.originalIndex);
      swatch.setAttribute('role', 'option');
      swatch.addEventListener('click', () => {
        selectColor(item.originalIndex, item.hex);
      });
      paletteEl.appendChild(swatch);
    });

    // Set initial selection: first chromatic color (skip eraser and near-black grays)
    const firstChromatic = sortedPalette.find(item => {
      const hsl = hexToHsl(item.hex);
      return item.originalIndex !== 0 && hsl[1] > 15;
    });
    selectedPaletteIndex = firstChromatic ? firstChromatic.originalIndex : 1;
    activeSwatch = paletteEl.querySelector('[data-palette-index="' + selectedPaletteIndex + '"]');
    if (activeSwatch) {
      activeSwatch.classList.add('active');
      if (isLightColor(PALETTE[selectedPaletteIndex])) {
        activeSwatch.style.borderColor = '#000000';
        activeSwatch.style.boxShadow = '0 0 6px rgba(0, 0, 0, 0.4)';
      } else {
        activeSwatch.style.borderColor = '#ffffff';
        activeSwatch.style.boxShadow = '0 0 8px rgba(0, 204, 204, 0.3)';
      }
    }
    updateColorPreview(PALETTE[selectedPaletteIndex]);

    // ── Palette keyboard navigation ──────────────────────────────────────────
    let paletteFocusIndex = 0;
    const PALETTE_COLS = 12; // matches grid-template-columns

    paletteEl.addEventListener('keydown', (e) => {
      const swatches = paletteEl.querySelectorAll('.swatch');
      const total = swatches.length;
      if (total === 0) return;

      let handled = true;
      if (e.key === 'ArrowRight') {
        paletteFocusIndex = Math.min(total - 1, paletteFocusIndex + 1);
      } else if (e.key === 'ArrowLeft') {
        paletteFocusIndex = Math.max(0, paletteFocusIndex - 1);
      } else if (e.key === 'ArrowDown') {
        paletteFocusIndex = Math.min(total - 1, paletteFocusIndex + PALETTE_COLS);
      } else if (e.key === 'ArrowUp') {
        paletteFocusIndex = Math.max(0, paletteFocusIndex - PALETTE_COLS);
      } else if (e.key === ' ') {
        // Select the focused swatch
        const swatch = swatches[paletteFocusIndex];
        if (swatch) {
          const idx = parseInt(swatch.getAttribute('data-palette-index'));
          selectColor(idx, PALETTE[idx]);
        }
      } else {
        handled = false;
      }

      if (handled) {
        e.preventDefault();
        // Visual focus indicator on the focused swatch
        swatches.forEach(s => s.classList.remove('palette-focused'));
        if (swatches[paletteFocusIndex]) {
          swatches[paletteFocusIndex].classList.add('palette-focused');
          swatches[paletteFocusIndex].scrollIntoView({ block: 'nearest' });
        }
      }
    });

    paletteEl.addEventListener('blur', () => {
      paletteEl.querySelectorAll('.palette-focused').forEach(s => s.classList.remove('palette-focused'));
    });

    // ── Pixel rendering ───────────────────────────────────────────────────────
    function hexToRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }

    /**
     * Paint a logical pixel at (x, y) into the ImageData buffer.
     * @param {number} x - logical x (0-249)
     * @param {number} y - logical y (0-249)
     * @param {string} hexColor - hex color string e.g. "#FF0000"
     * @param {boolean} [flush=true] - call putImageData after painting (set false for bulk load)
     */
    function paintPixelInBuffer(x, y, hexColor, flush) {
      const [r, g, b] = hexToRgb(hexColor);
      for (let dy = 0; dy < SCALE; dy++) {
        for (let dx = 0; dx < SCALE; dx++) {
          const idx = ((y * SCALE + dy) * (WIDTH * SCALE) + (x * SCALE + dx)) * 4;
          imageData.data[idx]     = r;
          imageData.data[idx + 1] = g;
          imageData.data[idx + 2] = b;
          // alpha already 255
        }
      }
      if (flush !== false) {
        ctx.putImageData(imageData, 0, 0);
      }
    }

    function isPixelEmpty(x, y) {
      const idx = ((y * SCALE) * (WIDTH * SCALE) + (x * SCALE)) * 4;
      return imageData.data[idx] === 0 && imageData.data[idx + 1] === 0 && imageData.data[idx + 2] === 0;
    }

    function isPixelSameColor(x, y, paletteIndex) {
      const idx = ((y * SCALE) * (WIDTH * SCALE) + (x * SCALE)) * 4;
      const [r, g, b] = hexToRgb(PALETTE[paletteIndex]);
      return imageData.data[idx] === r && imageData.data[idx + 1] === g && imageData.data[idx + 2] === b;
    }

    // ── Cursor coordinates ────────────────────────────────────────────────────
    const coordsEl = document.getElementById('coords');

    // ── Error feedback ──────────────────────────────────────────────────────
    function showCanvasError(message) {
      const existing = document.getElementById('canvas-error');
      if (existing) existing.remove();
      const overlay = document.createElement('div');
      overlay.id = 'canvas-error';
      const span = document.createElement('span');
      span.textContent = message;
      overlay.appendChild(span);
      const btn = document.createElement('button');
      btn.textContent = 'Retry';
      btn.addEventListener('click', () => loadCanvas());
      overlay.appendChild(btn);
      container.appendChild(overlay);
    }

    function showErrorFlash(message) {
      const flash = document.createElement('div');
      flash.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#331111;border:1px solid #ff4444;border-radius:6px;padding:8px 16px;font-family:"Share Tech Mono",monospace;font-size:14px;color:#ff6666;z-index:200;pointer-events:none;';
      flash.textContent = message;
      document.body.appendChild(flash);
      setTimeout(() => { flash.style.opacity = '0'; flash.style.transition = 'opacity 300ms'; }, 2000);
      setTimeout(() => flash.remove(), 2500);
    }

    // ── Canvas load ───────────────────────────────────────────────────────────
    async function loadCanvas() {
      const existing = document.getElementById('canvas-error');
      if (existing) existing.remove();
      try {
        const resp = await fetch('/api/canvas');
        if (!resp.ok) {
          console.error('Failed to load canvas:', resp.status);
          showCanvasError('Failed to load canvas (HTTP ' + resp.status + ')');
          return;
        }
        const pixels = await resp.json();
        // Paint all pixels into buffer without flushing (batch mode)
        pixels.forEach(p => paintPixelInBuffer(p.x, p.y, p.color, false));
        // Single flush after all pixels are painted
        ctx.putImageData(imageData, 0, 0);
      } catch (err) {
        console.error('Canvas load error:', err);
        showCanvasError('Network error loading canvas');
      }
    }

    // ── Screen reader announcements ──────────────────────────────────────────
    function announce(message) {
      const el = document.getElementById('sr-announce');
      if (el) {
        el.textContent = '';
        // Force reflow so screen reader detects the change even if same text
        void el.offsetHeight;
        el.textContent = message;
      }
    }

    // ── WebSocket / STOMP ─────────────────────────────────────────────────────
    function updateConnectionStatus(state) {
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (state === 'connected') {
        dot.style.background = '#00cc00';
        dot.style.boxShadow = '0 0 6px #00cc00';
        // Text set by updateOnlineCount -- announce happens there
      } else if (state === 'reconnecting') {
        dot.style.background = '#cccc00';
        dot.style.boxShadow = '0 0 6px #cccc00';
        text.textContent = 'reconnecting...';
        announce('Reconnecting');
      } else if (state === 'disconnected') {
        dot.style.background = '#cc0000';
        dot.style.boxShadow = '0 0 6px #cc0000';
        text.textContent = 'disconnected';
        announce('Disconnected');
      }
    }

    function updateOnlineCount(count) {
      document.getElementById('status-text').textContent = count + ' online';
    }

    function renderBankDisplay(balance, maxBalance, secondsUntil) {
      const balanceEl = document.getElementById('bank-balance');
      if (balanceEl) balanceEl.textContent = balance + '/' + maxBalance;
      // Update cursor
      document.getElementById('canvas').style.cursor =
        balance <= 0 ? 'not-allowed' : 'crosshair';
      updateDrawerStrip();
    }

    // Progress bar: CSS-transition driven, synced to server earn cycle
    // Spinner = unknown timing. Bar = synced to observed earn rate.
    // Guard: on connect, the server delivers a burst of queued earn messages in
    // the same event-loop tick.  Without protection the barber-pole is shown then
    // immediately overwritten by startProgressBar() before a frame renders.
    // progressLockedUntil holds a timestamp; other progress functions are no-ops
    // until Date.now() exceeds it.  500 ms covers any burst while the next real
    // earn tick (≥ 1 s away) will always get through.
    let progressLockedUntil = 0;
    let earnCycleDuration = 0; // learned when we first observe a point earned
    let earnCycleKnown = false; // true after first observed earn

    function setProgressBars(fn) {
      const fill = document.getElementById('bank-progress-fill');
      const drawerFill = document.getElementById('drawer-progress-fill');
      if (fill) fn(fill);
      if (drawerFill) fn(drawerFill);
    }

    function startProgressBar(seconds) {
      if (Date.now() < progressLockedUntil) return;
      // Shorten slightly to account for network latency — bar hits 100%
      // just before the server notification arrives rather than after
      const duration = Math.max(0.5, seconds - 0.3);
      setProgressBars(el => {
        el.classList.remove('progress-indeterminate');
        el.style.transition = 'none';
        el.style.width = '0%';
        void el.offsetWidth;
        el.style.transition = 'width ' + duration + 's linear';
        el.style.width = '100%';
      });
    }

    function showIndeterminateProgress() {
      progressLockedUntil = Date.now() + 500;
      setProgressBars(el => {
        el.style.transition = 'none';
        el.style.width = '';
        el.classList.add('progress-indeterminate');
      });
    }

    function showProgressFull() {
      if (Date.now() < progressLockedUntil) return;
      setProgressBars(el => {
        el.classList.remove('progress-indeterminate');
        el.style.transition = 'none';
        el.style.width = '100%';
      });
    }

    // Progress bar starts hidden (width: 0%). First updateBankDisplay call
    // decides whether to show spinner (not at max) or full bar (at max).
    let bankInitialized = false;

    function updateBankDisplay(state) {
      const prevBalance = localBalance;
      localBalance = state.balance;
      localMaxBalance = state.maxBalance;
      renderBankDisplay(state.balance, state.maxBalance, state.secondsUntilNextPoint);

      if (state.balance > prevBalance) {
        // Point earned — learn cycle duration regardless of hitting max
        earnCycleDuration = state.secondsUntilNextPoint;
        earnCycleKnown = true;
      }

      if (!bankInitialized) {
        // First server response — timing unknown, show barber-pole until first earn tick
        bankInitialized = true;
        showIndeterminateProgress();
      } else if (state.balance >= state.maxBalance) {
        // Full — solid bar
        showProgressFull();
      } else if (state.balance > prevBalance) {
        // Earned but not full — seamlessly start next cycle
        startProgressBar(earnCycleDuration);
      }
      // Spend or no-change: leave bar in current state (CSS transition continues undisturbed)
      // Flash animations
      const balanceEl = document.getElementById('bank-balance');
      if (!balanceEl) return;
      if (state.balance > prevBalance) {
        // Earned a point — green flash
        balanceEl.style.color = '#00cc00';
        setTimeout(() => { const el = document.getElementById('bank-balance'); if (el) el.style.color = '#00cccc'; }, 300);
      } else if (state.balance < prevBalance) {
        // Spent a point — brief dim
        balanceEl.style.color = '#666666';
        setTimeout(() => { const el = document.getElementById('bank-balance'); if (el) el.style.color = '#00cccc'; }, 200);
      }
      if (state.balance === 0 && prevBalance > 0) {
        announce('No pixels remaining');
      }
      updateDrawerStrip();
    }

    function flashBalanceRed() {
      const balanceEl = document.getElementById('bank-balance');
      if (!balanceEl) return;
      balanceEl.style.color = '#ff6666';
      setTimeout(() => { const el = document.getElementById('bank-balance'); if (el) el.style.color = '#00cccc'; }, 400);
      announce('No pixels remaining');
    }

    function connectWebSocket() {
      const client = new StompJs.Client({
        webSocketFactory: () => new SockJS('/ws'),
        connectHeaders: { uuid: localStorage.getItem('bitbrush_uuid') || '' },
        reconnectDelay: 5000,
        heartbeatIncoming: 10000,
        heartbeatOutgoing: 10000,
        debug: (str) => console.log('[STOMP]', str)
      });

      client.onConnect = () => {
        // Subscribe to pixel broadcasts -- re-established on every reconnect
        client.subscribe('/topic/pixels', (message) => {
          const p = JSON.parse(message.body);
          paintPixelInBuffer(p.x, p.y, p.color);

          const coordKey = p.x + ',' + p.y;
          if (p.erased) {
            // Erased pixel: clear coordinate from caches so tooltip won't show
            const previousAuthor = coordToAuthor.get(coordKey);
            if (previousAuthor) {
              pixelInfoCache.delete(previousAuthor);
            }
            coordToAuthor.delete(coordKey);
          } else {
            // Normal pixel: smart cache invalidation (existing logic)
            const previousAuthor = coordToAuthor.get(coordKey);
            const newAuthor = p.authorUuid;
            if (previousAuthor && previousAuthor !== newAuthor) {
              pixelInfoCache.delete(previousAuthor);
            }
            if (newAuthor) {
              pixelInfoCache.delete(newAuthor);
            }
            if (newAuthor) {
              coordToAuthor.set(coordKey, newAuthor);
              evictOldest(coordToAuthor, COORD_AUTHOR_CACHE_MAX);
            }
          }
        });

        // Subscribe to user count broadcasts -- re-established on every reconnect
        client.subscribe('/topic/users/count', (message) => {
          const count = parseInt(message.body, 10);
          updateOnlineCount(count);
        });

        // Request the current count immediately after subscribing (fixes race condition:
        // SessionConnectEvent fires before this subscription is set up, so the new client
        // misses its own join broadcast on /topic/users/count).
        // @SubscribeMapping on /app/users/count replies directly to this client only.
        client.subscribe('/app/users/count', (message) => {
          const count = parseInt(message.body, 10);
          updateOnlineCount(count);
        });

        // Subscribe to ongoing bank state pushes (per-user, not broadcast)
        client.subscribe('/user/queue/bank', (message) => {
          const state = JSON.parse(message.body);
          updateBankDisplay(state);
        });

        // Request initial bank state immediately on subscribe (same race-condition fix as /app/users/count)
        client.subscribe('/app/bank', (message) => {
          const state = JSON.parse(message.body);
          updateBankDisplay(state);
        });

        // RTME-03: re-fetch full canvas state on every connect (including reconnects)
        loadCanvas();

        updateConnectionStatus('connected');
      };

      client.onWebSocketClose = () => {
        // StompJs.Client will auto-reconnect -- show yellow dot while waiting
        updateConnectionStatus('reconnecting');
      };

      client.activate();
      return client;
    }

    // ── Identity / username modal ─────────────────────────────────────────────
    function getOrCreateUuid() {
      let uuid = localStorage.getItem('bitbrush_uuid');
      if (!uuid) {
        uuid = crypto.randomUUID();
        localStorage.setItem('bitbrush_uuid', uuid);
      }
      return uuid;
    }

    function showModal(uuid) {
      const overlay = document.getElementById('modal-overlay');
      overlay.style.display = 'flex';

      const input    = document.getElementById('username-input');
      const errorEl  = document.getElementById('modal-error');
      const submitBtn = document.getElementById('username-submit');

      // Focus the input after modal opens
      setTimeout(() => input.focus(), 100);

      // Allow Enter key to submit
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submitBtn.click();
      });

      submitBtn.addEventListener('click', async () => {
        const username = input.value.trim();
        errorEl.textContent = '';

        if (username.length < 3 || username.length > 30) {
          errorEl.textContent = 'Username must be 3-30 characters';
          return;
        }

        if (username.toLowerCase() === 'you') {
          errorEl.textContent = "Username 'You' is reserved";
          return;
        }

        try {
          const resp = await fetch('/api/users', {
            method: 'POST',
            headers: turnstileHeaders(),
            body: JSON.stringify({ uuid, username })
          });

          if (resp.status === 201) {
            localStorage.setItem('bitbrush_username', username);
            overlay.style.display = 'none';
            // Show hint overlay for first-time users
            setTimeout(showHintOverlay, 300);
          } else if (resp.status === 403) {
            refreshTurnstile();
            errorEl.textContent = 'Verification failed — please try again';
          } else {
            let msg = 'Registration failed';
            try {
              const err = await resp.json();
              msg = err.detail || msg;
            } catch (_) { /* ignore parse error */ }
            errorEl.textContent = msg;
          }
        } catch (err) {
          errorEl.textContent = 'Network error — please try again';
          console.error('User registration error:', err);
        }
      });
    }

    async function initIdentity() {
      const uuid = getOrCreateUuid();
      const username = localStorage.getItem('bitbrush_username');
      if (!username) {
        showModal(uuid);
      } else {
        // Re-register silently — DB may have been reset (ddl-auto=create)
        try {
          const resp = await fetch('/api/users', {
            method: 'POST',
            headers: turnstileHeaders(),
            body: JSON.stringify({ uuid, username })
          });
          if (resp.status === 403) refreshTurnstile();
        } catch (_) { /* best effort */ }
        // Show hints if returning user hasn't seen them
        showHintOverlay();
      }
    }

    // ── Zoom handler (scroll wheel) ──────────────────────────────────────────
    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = container.getBoundingClientRect();
      // Mouse position in container coordinates
      const mouseContainerX = e.clientX - rect.left;
      const mouseContainerY = e.clientY - rect.top;
      // Mouse position in canvas-space before zoom
      const beforeX = mouseContainerX / zoom - panX;
      const beforeY = mouseContainerY / zoom - panY;

      // Step zoom
      if (e.deltaY < 0 && zoomIndex < ZOOM_LEVELS.length - 1) {
        zoomIndex++;
      } else if (e.deltaY > 0 && zoomIndex > 0) {
        zoomIndex--;
      }
      zoom = ZOOM_LEVELS[zoomIndex];

      // Adjust pan so mouse stays on same canvas point after zoom
      panX = mouseContainerX / zoom - beforeX;
      panY = mouseContainerY / zoom - beforeY;
      clampPan();
      applyTransform();
      const logical = screenToLogical(e);
      updateCoordsDisplay(logical.x, logical.y);
    }, { passive: false });

    // ── Pan handler (right-click drag) ───────────────────────────────────────
    container.addEventListener('contextmenu', (e) => e.preventDefault());

    let isPanning = false;
    let panStartX = 0, panStartY = 0;
    let panStartPanX = 0, panStartPanY = 0;

    container.addEventListener('mousedown', (e) => {
      if (e.button === 2) {
        isPanning = true;
        panStartX = e.clientX;
        panStartY = e.clientY;
        panStartPanX = panX;
        panStartPanY = panY;
        container.style.cursor = 'grabbing';
        e.preventDefault();
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (isPanning) {
        const dx = (e.clientX - panStartX) / zoom;
        const dy = (e.clientY - panStartY) / zoom;
        panX = panStartPanX + dx;
        panY = panStartPanY + dy;
        clampPan();
        applyTransform();
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (isPanning && e.button === 2) {
        isPanning = false;
        container.style.cursor = '';
      }
    });

    // ── Coordinates display + tooltip trigger (mousemove on container) ────
    container.addEventListener('mousemove', (e) => {
      if (kbMode) {
        kbMode = false;
        drawGrid(); // Clear keyboard cursor from overlay
      }
      if (isPanning) return;
      const { x, y } = screenToLogical(e);
      updateCoordsDisplay(x, y);

      // Tooltip trigger (only when not dragging and not panning)
      if (!isDragging && !isPanning) {
        if (x !== lastHoverX || y !== lastHoverY) {
          // Clear previous highlight and tooltip immediately on pixel change
          hideTooltip();
          lastHoverX = x;
          lastHoverY = y;
          debouncedFetchInfo(x, y, e.clientX, e.clientY);
        }
      }
      // Hide tooltip during drag
      if (isDragging) {
        hideTooltip();
      }
    });

    // ── Hide tooltip on mouseleave ───────────────────────────────────────────
    container.addEventListener('mouseleave', () => {
      hideTooltip();
      lastHoverX = -1;
      lastHoverY = -1;
    });

    // ── Canvas keyboard navigation ──────────────────────────────────────────
    container.addEventListener('keydown', (e) => {
      // Only handle when canvas container is focused
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
      } else {
        return;
      }

      // Activate keyboard mode on first arrow key
      if (!kbMode) {
        kbMode = true;
        if (kbCursorX < 0) {
          // Start at center of canvas
          kbCursorX = Math.floor(WIDTH / 2);
          kbCursorY = Math.floor(HEIGHT / 2);
        }
      }

      if (e.key === 'ArrowUp') {
        kbCursorY = Math.max(0, kbCursorY - 1);
        autoPanToKeyboardCursor();
      } else if (e.key === 'ArrowDown') {
        kbCursorY = Math.min(HEIGHT - 1, kbCursorY + 1);
        autoPanToKeyboardCursor();
      } else if (e.key === 'ArrowLeft') {
        kbCursorX = Math.max(0, kbCursorX - 1);
        autoPanToKeyboardCursor();
      } else if (e.key === 'ArrowRight') {
        kbCursorX = Math.min(WIDTH - 1, kbCursorX + 1);
        autoPanToKeyboardCursor();
      } else if (e.key === ' ') {
        // Place pixel at keyboard cursor position
        const username = localStorage.getItem('bitbrush_username');
        const uuid = localStorage.getItem('bitbrush_uuid');
        if (!username || !uuid) return;

        if (localBalance <= 0) {
          flashBalanceRed();
          return;
        }
        if (selectedPaletteIndex === 0 && isPixelEmpty(kbCursorX, kbCursorY)) return; // eraser on empty cell: no-op
        if (selectedPaletteIndex !== 0 && isPixelSameColor(kbCursorX, kbCursorY, selectedPaletteIndex)) return; // same color: no-op

        // Optimistic local paint
        paintPixelInBuffer(kbCursorX, kbCursorY, PALETTE[selectedPaletteIndex]);

        // Optimistic balance decrement
        const wasAtMax = localBalance >= localMaxBalance;
        localBalance = Math.max(0, localBalance - 1);
        const balanceDisplay = document.getElementById('bank-balance');
        if (balanceDisplay) balanceDisplay.textContent = localBalance + '/' + localMaxBalance;
        canvas.style.cursor = localBalance <= 0 ? 'not-allowed' : 'crosshair';
        if (wasAtMax) showIndeterminateProgress();

        // Send placement to server
        fetch('/api/pixels', {
          method: 'POST',
          headers: turnstileHeaders(),
          body: JSON.stringify({
            pixels: [{ x: kbCursorX, y: kbCursorY }],
            paletteIndex: selectedPaletteIndex,
            authorUuid: uuid
          })
        }).then(resp => {
          if (resp.ok) fetchStats();
          else if (resp.status === 402) flashBalanceRed();
          else if (resp.status === 403) { refreshTurnstile(); showErrorFlash('Verification failed — retrying'); }
          else { showErrorFlash('Pixel placement failed'); loadCanvas(); }
        }).catch(err => {
          showErrorFlash('Network error placing pixel');
          loadCanvas();
          console.error('Keyboard pixel placement error:', err);
        });

        // Redraw cursor after pixel change
        drawGrid();
      }

      // Update coordinates display
      updateCoordsDisplay(kbCursorX, kbCursorY);
    });

    // ── Bresenham line interpolation ────────────────────────────────────────
    function bresenhamLine(x0, y0, x1, y1) {
      const points = [];
      let dx = Math.abs(x1 - x0);
      let sx = x0 < x1 ? 1 : -1;
      let dy = -Math.abs(y1 - y0);
      let sy = y0 < y1 ? 1 : -1;
      let error = dx + dy;
      while (true) {
        points.push({ x: x0, y: y0 });
        if (x0 === x1 && y0 === y1) break;
        let e2 = 2 * error;
        if (e2 >= dy) { error += dy; x0 += sx; }
        if (e2 <= dx) { error += dx; y0 += sy; }
      }
      return points;
    }

    // ── Drag-to-place state ──────────────────────────────────────────────────
    let isDragging = false;
    let dragPixels = new Set();     // "x,y" strings for deduplication
    let dragPixelList = [];         // [{x, y}] in order (for batch POST)
    let lastDragX = -1, lastDragY = -1;  // last logical pixel during drag
    let touchState = 'IDLE';  // touch gesture state machine (declared early for mousedown guard)

    function placePixelDuringDrag(x, y) {
      const key = x + ',' + y;
      if (dragPixels.has(key)) return;  // deduplicate
      if (localBalance <= 0) return;     // stop placing silently when balance hits 0
      if (selectedPaletteIndex === 0 && isPixelEmpty(x, y)) return; // eraser on empty cell: no-op
      if (selectedPaletteIndex !== 0 && isPixelSameColor(x, y, selectedPaletteIndex)) return; // same color: no-op

      dragPixels.add(key);
      dragPixelList.push({ x, y });

      // Optimistic local paint
      paintPixelInBuffer(x, y, PALETTE[selectedPaletteIndex]);

      // Optimistic balance decrement
      const wasAtMax = localBalance >= localMaxBalance;
      localBalance = Math.max(0, localBalance - 1);
      const balanceDisplay = document.getElementById('bank-balance');
      if (balanceDisplay) balanceDisplay.textContent = localBalance + '/' + localMaxBalance;
      canvas.style.cursor = localBalance <= 0 ? 'not-allowed' : 'crosshair';
      if (wasAtMax) showIndeterminateProgress();
    }

    // ── Pixel placement (mousedown starts drag or single-click) ─────────────
    container.addEventListener('mousedown', (e) => {
      if (touchState !== 'IDLE') return;  // ignore synthetic mouse events during touch
      if (e.button === 2) return;  // right-click pan handled above
      if (e.button !== 0) return;  // only left-click
      if (isPanning) return;       // don't place while panning

      const username = localStorage.getItem('bitbrush_username');
      const uuid = localStorage.getItem('bitbrush_uuid');
      if (!username || !uuid) return;

      if (localBalance <= 0) {
        flashBalanceRed();
        return;
      }

      const { x, y } = screenToLogical(e);
      isDragging = true;
      dragPixels = new Set();
      dragPixelList = [];
      lastDragX = x;
      lastDragY = y;

      placePixelDuringDrag(x, y);
    });

    // ── Drag mousemove (extends drag path with Bresenham interpolation) ──────
    // Note: merged with coords display -- the separate container mousemove above
    // handles coords when NOT dragging. This window listener handles drag extension.
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      if (isPanning) return;

      const { x, y } = screenToLogical(e);

      if (x !== lastDragX || y !== lastDragY) {
        const points = bresenhamLine(lastDragX, lastDragY, x, y);
        // Skip first point (it's lastDrag, already placed)
        for (let i = 1; i < points.length; i++) {
          placePixelDuringDrag(points[i].x, points[i].y);
        }
        lastDragX = x;
        lastDragY = y;
      }
    });

    // ── Finalize drag batch (shared by mouse and touch) ────────────────────
    async function finalizeDragBatch() {
      isDragging = false;

      if (dragPixelList.length === 0) return;

      const uuid = localStorage.getItem('bitbrush_uuid');
      const pixelsBatch = dragPixelList.slice();  // copy for async
      dragPixels = new Set();
      dragPixelList = [];

      try {
        const resp = await fetch('/api/pixels', {
          method: 'POST',
          headers: turnstileHeaders(),
          body: JSON.stringify({
            pixels: pixelsBatch,
            paletteIndex: selectedPaletteIndex,
            authorUuid: uuid
          })
        });

        if (!resp.ok) {
          if (resp.status === 402) {
            flashBalanceRed();
          } else if (resp.status === 403) {
            refreshTurnstile();
          }
          showErrorFlash('Pixel placement failed');
          loadCanvas();
          console.error('Batch pixel placement failed:', resp.status);
        } else {
          fetchStats();
        }
      } catch (err) {
        showErrorFlash('Network error placing pixels');
        loadCanvas();
        console.error('Batch pixel placement network error:', err);
      }
    }

    // ── Drag mouseup ────────────────────────────────────────────────────────
    window.addEventListener('mouseup', (e) => {
      if (!isDragging || e.button !== 0) return;
      finalizeDragBatch();
    });

    // ── Touch gesture support ────────────────────────────────────────────────
    // State machine: IDLE → WAITING → DRAWING or PINCH_PAN → IDLE
    // WAITING: first finger down, 80ms window for second finger to arrive
    // DRAWING: single-finger tap or drag (places pixels)
    // PINCH_PAN: two-finger gesture (zoom + pan simultaneously)

    const TOUCH_WAIT_MS = 80;
    const TOUCH_MOVE_COMMIT_PX = 4;

    let touchWaitTimer = null;
    let touchStartSingle = null;
    let touchDrawId = null;
    let touchLastX = -1, touchLastY = -1;
    let touchPinchStartDist = 0;
    let touchPinchStartZoomIdx = 0;
    let touchPanStartMidX = 0, touchPanStartMidY = 0;
    let touchPanStartPanX = 0, touchPanStartPanY = 0;

    function getTouchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function getTouchMidpoint(t1, t2) {
      return {
        clientX: (t1.clientX + t2.clientX) / 2,
        clientY: (t1.clientY + t2.clientY) / 2
      };
    }

    function beginTouchDraw(touchInfo) {
      const username = localStorage.getItem('bitbrush_username');
      const uuid = localStorage.getItem('bitbrush_uuid');
      if (!username || !uuid) return;

      if (localBalance <= 0) {
        flashBalanceRed();
        return;
      }

      touchDrawId = touchInfo.id;
      const { x, y } = screenToLogical({ clientX: touchInfo.startX, clientY: touchInfo.startY });

      isDragging = true;
      dragPixels = new Set();
      dragPixelList = [];
      lastDragX = x;
      lastDragY = y;
      touchLastX = x;
      touchLastY = y;

      placePixelDuringDrag(x, y);
    }

    function handleTouchDrawMove(touch) {
      if (!isDragging) return;
      const { x, y } = screenToLogical({ clientX: touch.clientX, clientY: touch.clientY });

      if (x !== touchLastX || y !== touchLastY) {
        const points = bresenhamLine(touchLastX, touchLastY, x, y);
        for (let i = 1; i < points.length; i++) {
          placePixelDuringDrag(points[i].x, points[i].y);
        }
        touchLastX = x;
        touchLastY = y;
        lastDragX = x;
        lastDragY = y;
      }
    }

    container.addEventListener('touchstart', (e) => {
      e.preventDefault();

      if (e.touches.length === 1 && touchState === 'IDLE') {
        const touch = e.touches[0];
        touchState = 'WAITING';
        touchStartSingle = {
          id: touch.identifier,
          startX: touch.clientX,
          startY: touch.clientY
        };

        touchWaitTimer = setTimeout(() => {
          if (touchState === 'WAITING') {
            touchState = 'DRAWING';
            beginTouchDraw(touchStartSingle);
          }
        }, TOUCH_WAIT_MS);

      } else if (e.touches.length >= 2) {
        if (touchWaitTimer) {
          clearTimeout(touchWaitTimer);
          touchWaitTimer = null;
        }

        if (touchState === 'DRAWING' && isDragging) {
          if (dragPixelList.length <= 2) {
            isDragging = false;
            dragPixels = new Set();
            dragPixelList = [];
            loadCanvas();
          } else {
            finalizeDragBatch();
          }
        }

        touchState = 'PINCH_PAN';

        const t0 = e.touches[0];
        const t1 = e.touches[1];
        touchPinchStartDist = getTouchDistance(t0, t1);
        touchPinchStartZoomIdx = zoomIndex;
        const mid = getTouchMidpoint(t0, t1);
        touchPanStartMidX = mid.clientX;
        touchPanStartMidY = mid.clientY;
        touchPanStartPanX = panX;
        touchPanStartPanY = panY;
      }
    }, { passive: false });

    container.addEventListener('touchmove', (e) => {
      e.preventDefault();

      if (touchState === 'WAITING' && e.touches.length === 1) {
        const touch = e.touches[0];
        const dx = touch.clientX - touchStartSingle.startX;
        const dy = touch.clientY - touchStartSingle.startY;
        if (Math.sqrt(dx * dx + dy * dy) >= TOUCH_MOVE_COMMIT_PX) {
          clearTimeout(touchWaitTimer);
          touchWaitTimer = null;
          touchState = 'DRAWING';
          beginTouchDraw(touchStartSingle);
          handleTouchDrawMove(touch);
        }
        return;
      }

      if (touchState === 'DRAWING' && e.touches.length === 1) {
        const touch = Array.from(e.touches).find(t => t.identifier === touchDrawId);
        if (touch) handleTouchDrawMove(touch);
        return;
      }

      if (touchState === 'PINCH_PAN' && e.touches.length >= 2) {
        const t0 = e.touches[0];
        const t1 = e.touches[1];

        // Pan: track midpoint shift
        const mid = getTouchMidpoint(t0, t1);
        const dx = (mid.clientX - touchPanStartMidX) / zoom;
        const dy = (mid.clientY - touchPanStartMidY) / zoom;
        panX = touchPanStartPanX + dx;
        panY = touchPanStartPanY + dy;
        clampPan();

        // Pinch zoom: map distance ratio to zoom level steps
        const currentDist = getTouchDistance(t0, t1);
        const ratio = currentDist / touchPinchStartDist;

        let newZoomIdx = touchPinchStartZoomIdx;
        if (ratio > 1.5) newZoomIdx = Math.min(touchPinchStartZoomIdx + 2, ZOOM_LEVELS.length - 1);
        else if (ratio > 1.2) newZoomIdx = Math.min(touchPinchStartZoomIdx + 1, ZOOM_LEVELS.length - 1);
        else if (ratio < 0.67) newZoomIdx = Math.max(touchPinchStartZoomIdx - 2, 0);
        else if (ratio < 0.83) newZoomIdx = Math.max(touchPinchStartZoomIdx - 1, 0);

        if (newZoomIdx !== zoomIndex) {
          const rect = container.getBoundingClientRect();
          const midContainerX = mid.clientX - rect.left;
          const midContainerY = mid.clientY - rect.top;
          const beforeX = midContainerX / zoom - panX;
          const beforeY = midContainerY / zoom - panY;

          zoomIndex = newZoomIdx;
          zoom = ZOOM_LEVELS[zoomIndex];

          panX = midContainerX / zoom - beforeX;
          panY = midContainerY / zoom - beforeY;
          clampPan();
        }

        applyTransform();
        return;
      }
    }, { passive: false });

    container.addEventListener('touchend', (e) => {
      e.preventDefault();

      if (touchState === 'WAITING') {
        clearTimeout(touchWaitTimer);
        touchWaitTimer = null;
        touchState = 'IDLE';
        // Quick tap — place a single pixel
        beginTouchDraw(touchStartSingle);
        finalizeDragBatch();
        return;
      }

      if (touchState === 'DRAWING') {
        if (e.touches.length === 0) {
          touchState = 'IDLE';
          finalizeDragBatch();
        }
        return;
      }

      if (touchState === 'PINCH_PAN') {
        if (e.touches.length < 2) {
          touchState = 'IDLE';
          touchDrawId = null;
        }
        return;
      }
    }, { passive: false });

    container.addEventListener('touchcancel', () => {
      if (touchWaitTimer) {
        clearTimeout(touchWaitTimer);
        touchWaitTimer = null;
      }
      if (touchState === 'DRAWING' && isDragging) {
        isDragging = false;
        dragPixels = new Set();
        dragPixelList = [];
        loadCanvas();
      }
      touchState = 'IDLE';
      isDragging = false;
      touchDrawId = null;
    }, { passive: false });

    // ── Export PNG ─────────────────────────────────────────────────────────────
    document.getElementById('export-btn').addEventListener('click', async () => {
      const btn = document.getElementById('export-btn');
      if (btn.disabled) return;
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Exporting...';
      try {
        const resp = await fetch('/api/canvas/png');
        if (!resp.ok) throw new Error('Export failed: ' + resp.status);
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'bitbrush-canvas.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        console.error('Export error:', err);
        showErrorFlash('Export failed');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });

    // ── Stats ───────────────────────────────────────────────────────────────
    function formatNumber(n) {
      return n.toLocaleString();
    }

    async function fetchStats() {
      const statsEl = document.getElementById('stats');
      try {
        const resp = await fetch('/api/stats');
        if (!resp.ok) {
          statsEl.innerHTML = '<span style="color:#666666;">Stats unavailable</span>';
          return;
        }
        const data = await resp.json();

        if (data.totalPixels === 0) {
          statsEl.innerHTML = '<span style="color:#888888;">No pixels placed yet</span>';
          return;
        }

        let html = '<span style="color:#cccccc; font-size:14px;">'
          + formatNumber(data.totalPixels) + ' pixels placed</span>';

        const top5 = data.colorDistribution.slice(0, 5);
        html += '<div style="display:flex; flex-wrap:wrap; gap:4px;">';
        for (const entry of top5) {
          const hex = PALETTE[entry.paletteIndex] || '#000000';
          html += '<span style="display:inline-flex; align-items:center; gap:3px;">'
            + '<span style="display:inline-block; width:10px; height:10px; background:'
            + hex + '; border-radius:2px; flex-shrink:0;"></span>'
            + '<span style="font-size:13px; color:#888888;">'
            + formatNumber(entry.pixelCount) + '</span></span>';
        }
        html += '</div>';

        statsEl.innerHTML = html;
      } catch (err) {
        statsEl.innerHTML = '<span style="color:#666666;">Stats unavailable</span>';
      }
    }

    // ── Mobile drawer ───────────────────────────────────────────────────────
    const drawerEl = document.getElementById('drawer');
    const drawerStrip = document.getElementById('drawer-strip');
    const drawerContent = document.getElementById('drawer-content');

    if (drawerStrip) {
      drawerStrip.addEventListener('click', () => {
        const isExpanded = drawerEl.classList.toggle('expanded');
        drawerStrip.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
      });

      drawerStrip.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          drawerStrip.click();
        }
      });

      // Close drawer on click outside (on canvas area)
      document.addEventListener('click', (e) => {
        if (drawerEl.classList.contains('expanded') && !drawerEl.contains(e.target)) {
          drawerEl.classList.remove('expanded');
          drawerStrip.setAttribute('aria-expanded', 'false');
        }
      });
    }

    function updateDrawerStrip() {
      const balanceEl = document.getElementById('drawer-balance');
      const swatchEl = document.getElementById('drawer-swatch');
      if (balanceEl) {
        balanceEl.textContent = localBalance + '/' + localMaxBalance;
      }
      if (swatchEl) {
        if (selectedPaletteIndex === 0) {
          swatchEl.style.backgroundColor = '#1a1a1a';
          swatchEl.style.borderColor = '#ff4444';
          swatchEl.classList.add('eraser-swatch');
        } else {
          swatchEl.style.backgroundColor = PALETTE[selectedPaletteIndex];
          swatchEl.style.borderColor = '';
          swatchEl.classList.remove('eraser-swatch');
        }
      }
      // Sync recent colors in drawer strip
      const recentEl = document.getElementById('drawer-recent-colors');
      if (recentEl) {
        recentEl.innerHTML = '';
        const show = recentColors.slice(0, 4); // show up to 4 recent colors
        show.forEach(hex => {
          const dot = document.createElement('span');
          dot.className = 'drawer-recent-dot';
          dot.style.backgroundColor = hex;
          dot.addEventListener('click', (e) => {
            e.stopPropagation();
            const origIdx = PALETTE.indexOf(hex);
            if (origIdx !== -1) selectColor(origIdx, hex);
          });
          recentEl.appendChild(dot);
        });
      }
      // Drawer progress bar is synced by setProgressBars() in updateBankDisplay
    }

    // ── First-visit hint overlay ─────────────────────────────────────────────
    function showHintOverlay() {
      if (localStorage.getItem('bitbrush_hints_seen') === 'true') return;

      const hint = document.createElement('div');
      hint.id = 'hint-overlay';
      hint.setAttribute('role', 'status');
      hint.setAttribute('aria-live', 'polite');
      const isMobile = window.matchMedia('(max-width: 767px)').matches || 'ontouchstart' in window;
      if (isMobile) {
        hint.textContent = 'Pinch to zoom \u00B7 Two-finger drag to pan \u00B7 Tap to draw';
      } else {
        hint.textContent = 'Scroll to zoom \u00B7 Right-drag to pan \u00B7 Left click (or click and drag) to draw';
      }
      container.appendChild(hint);

      let dismissed = false;
      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        hint.style.opacity = '0';
        setTimeout(() => { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 500);
        localStorage.setItem('bitbrush_hints_seen', 'true');
      }

      container.addEventListener('wheel', dismiss, { once: true });
      container.addEventListener('mousedown', dismiss, { once: true });
      container.addEventListener('touchstart', dismiss, { once: true });
      container.addEventListener('keydown', dismiss, { once: true });
      setTimeout(dismiss, 10000);
    }

    // ── Modal focus trapping ─────────────────────────────────────────────────
    const modalOverlay = document.getElementById('modal-overlay');
    modalOverlay.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        const focusable = modalOverlay.querySelectorAll('input, button, [tabindex]:not([tabindex="-1"])');
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    });

    // ── Bootstrap ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      updateContainerSize();
      centerCanvas();
      applyTransform();
      renderRecentColors();
      await initIdentity();
      await loadCanvas();
      applyTransform();  // re-draw grid over loaded pixels
      connectWebSocket();
      fetchStats();
      setInterval(fetchStats, 30000);

      // Populate mobile drawer content
      if (drawerContent && window.matchMedia('(max-width: 767px)').matches) {
        const drawerPalette = document.createElement('div');
        drawerPalette.id = 'drawer-palette';
        drawerPalette.style.cssText = 'display:grid; grid-template-columns:repeat(12,1fr); gap:2px;';

        sortedPalette.forEach((item) => {
          const swatch = document.createElement('div');
          swatch.className = 'swatch';
          if (item.originalIndex === 0) {
            swatch.classList.add('eraser-swatch');
            swatch.title = 'Eraser';
          } else {
            swatch.style.backgroundColor = item.hex;
            swatch.title = item.hex;
          }
          swatch.addEventListener('click', () => {
            selectColor(item.originalIndex, item.hex);
            updateDrawerStrip();
          });
          drawerPalette.appendChild(swatch);
        });

        drawerContent.appendChild(drawerPalette);
      }

      updateDrawerStrip();
    });
  </script>
</body>
</html>
