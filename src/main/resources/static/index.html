<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitBrush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&amp;family=Share+Tech+Mono&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;
      color: #cccccc;
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      line-height: 1.2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    #app {
      display: grid;
      grid-template-columns: 1fr 250px;
      grid-template-rows: auto;
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    #canvas-container {
      grid-column: 1;
      grid-row: 1;
      aspect-ratio: 1 / 1;
      max-height: calc(100vh - 80px);
      overflow: hidden;
      position: relative;
      background: #000000;
      touch-action: none;
    }

    #canvas {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      touch-action: none;
    }

    #overlay {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    #sidebar {
      grid-column: 2;
      grid-row: 1;
      width: 250px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 80px);
      flex-shrink: 0;
    }

    #footer {
      grid-column: 1;
      grid-row: 2;
      display: none;
    }

    #stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 16px;
    }

    #color-preview {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #color-preview-swatch {
      width: 32px;
      height: 32px;
      border-radius: 3px;
      border: 2px solid #ffffff;
      flex-shrink: 0;
    }

    #color-preview-hex {
      font-size: 14px;
      color: #888888;
    }

    #recent-colors {
      display: flex;
      gap: 4px;
    }

    .recent-swatch {
      width: 24px;
      height: 24px;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 3px;
      transition: border-color 0.15s, transform 0.1s;
    }

    .recent-swatch:hover {
      border-color: rgba(255, 255, 255, 0.4);
      transform: scale(1.15);
      z-index: 1;
    }

    .recent-swatch.empty {
      border: 1px dashed rgba(255, 255, 255, 0.08);
      cursor: default;
    }

    .recent-swatch.empty:hover {
      border-color: rgba(255, 255, 255, 0.08);
      transform: none;
    }

    #title {
      font-family: 'Major Mono Display', monospace;
      font-size: 20px;
      color: #ffffff;
      line-height: 1.2;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 16px;
      color: #888888;
      white-space: nowrap;
    }

    #status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666666;
      flex-shrink: 0;
    }

    #bank {
      font-size: 20px;
      color: #cccccc;
      white-space: nowrap;
    }

    #bank-balance {
      color: #00cccc;
      transition: color 0.3s ease;
    }

    #bank-progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    #bank-progress-fill {
      height: 100%;
      width: 0%;
      background: #00cccc;
      border-radius: 2px;
    }

    .progress-indeterminate {
      width: 100% !important;
      background-color: transparent !important;
      background-image: repeating-linear-gradient(
        -45deg,
        #00cccc 0, #00cccc 8px,
        transparent 8px, transparent 16px
      ) !important;
      background-size: 22.6px 100% !important;
      animation: barberpole 0.6s linear infinite !important;
    }

    @keyframes barberpole {
      to { background-position: 22.6px 0; }
    }

    #coords {
      font-size: 16px;
      color: #666666;
      white-space: nowrap;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .section-label {
      font-size: 14px;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #palette {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 2px;
    }

    .swatch {
      aspect-ratio: 1;
      min-width: 0;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 2px;
      flex-shrink: 0;
      transition: border-color 0.15s, transform 0.1s;
    }

    .swatch:hover {
      border-color: rgba(255, 255, 255, 0.4);
      transform: scale(1.15);
      z-index: 1;
    }

    .swatch.active {
      border-color: #ffffff;
      box-shadow: 0 0 8px rgba(0, 204, 204, 0.3);
    }

    .swatch.palette-focused {
      outline: 2px solid #00cccc;
      outline-offset: 1px;
      z-index: 2;
    }

    .swatch.eraser-swatch {
      background-color: #1a1a1a !important;
      position: relative;
    }
    .swatch.eraser-swatch::before,
    .swatch.eraser-swatch::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70%;
      height: 2px;
      background-color: #ff4444;
    }
    .swatch.eraser-swatch::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }
    .swatch.eraser-swatch::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    /* Username modal */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    #modal {
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 280px;
      max-width: 360px;
    }

    #modal h2 {
      font-family: 'Share Tech Mono', monospace;
      color: #ffffff;
      font-size: 20px;
      font-weight: 400;
    }

    #modal p {
      font-family: 'Share Tech Mono', monospace;
      color: #888888;
      font-size: 16px;
    }

    #username-input {
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #ffffff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      padding: 8px 12px;
      outline: none;
      width: 100%;
    }

    #username-input:focus {
      border-color: #00cccc;
    }

    #modal-error {
      color: #ff6666;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      min-height: 20px;
    }

    #username-submit {
      background: #00cccc;
      border: none;
      border-radius: 4px;
      color: #000000;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      padding: 8px 16px;
      align-self: flex-end;
    }

    #username-submit:hover {
      background: #00eeee;
    }

    /* Tooltip */
    #tooltip {
      display: none;
      position: fixed;
      z-index: 100;
      pointer-events: none;
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      padding: 8px;
      font-family: 'Share Tech Mono', monospace;
      max-width: 250px;
    }

    #tooltip-username {
      font-size: 16px;
      color: #ffffff;
    }

    #tooltip-time {
      font-size: 14px;
      color: #888888;
    }

    /* Export button */
    #export-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #cccccc;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      padding: 8px 12px;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
    }

    #export-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    #export-btn:disabled {
      opacity: 0.5;
      cursor: wait;
      pointer-events: none;
    }

    #canvas-error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border-radius: 8px;
      padding: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: #ff6666;
      text-align: center;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    #canvas-error button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #cccccc;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      padding: 6px 16px;
      cursor: pointer;
    }
    #canvas-error button:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Focus outline (global a11y) */
    *:focus-visible {
      outline: 2px solid #00cccc;
      outline-offset: 2px;
    }

    /* Hint overlay */
    #hint-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      border-radius: 8px;
      padding: 16px 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: #00cccc;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      transition: opacity 500ms ease-out;
    }

    /* Mobile drawer -- hidden on desktop */
    #drawer {
      display: none;
    }

    @media (max-width: 767px) {
      #app {
        display: flex;
        flex-direction: column;
        max-width: 100%;
      }

      #canvas-container {
        width: 100%;
        max-height: calc(100vh - 64px - 48px);
      }

      #sidebar {
        display: none;
      }

      #footer {
        display: none;
      }

      #drawer {
        display: block;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1a1a1a;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        transform: translateY(calc(100% - 48px));
        transition: transform 300ms ease-out;
        max-height: 60vh;
        z-index: 50;
      }

      #drawer.expanded {
        transform: translateY(0);
        overflow-y: auto;
      }

      #drawer-strip {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        cursor: pointer;
        user-select: none;
      }

      #drawer-balance {
        font-family: 'Share Tech Mono', monospace;
        font-size: 20px;
        color: #00cccc;
      }

      #drawer-swatch {
        width: 24px;
        height: 24px;
        border-radius: 3px;
        border: 2px solid #ffffff;
        flex-shrink: 0;
      }

      #drawer-recent-colors {
        display: flex;
        gap: 3px;
        align-items: center;
      }

      .drawer-recent-dot {
        width: 16px;
        height: 16px;
        border-radius: 2px;
        flex-shrink: 0;
        cursor: pointer;
      }

      #drawer-progress-bar {
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      #drawer-progress-fill {
        height: 100%;
        width: 0%;
        background: #00cccc;
      }

      #drawer-content {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.3.0/bundles/stomp.umd.min.js"></script>
</head>
<body>

  <!-- Username modal (shown when no username in LocalStorage) -->
  <div id="modal-overlay">
    <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
      <h2 id="modal-heading">Welcome to BitBrush</h2>
      <p>Choose a username to start painting</p>
      <input id="username-input" type="text" placeholder="username (3-30 chars)" maxlength="30">
      <div id="modal-error"></div>
      <button id="username-submit">Join</button>
    </div>
  </div>

  <!-- Tooltip (outside #app, positioned fixed relative to viewport) -->
  <div id="tooltip">
    <div id="tooltip-username"></div>
    <div id="tooltip-time"></div>
  </div>

  <!-- Screen reader announcements (visually hidden) -->
  <div id="sr-announce" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;"></div>

  <!-- Main layout -->
  <div id="app">
    <div id="canvas-container" tabindex="0" role="application" aria-label="Pixel canvas, use arrow keys to navigate, Space to place pixel">
      <canvas id="canvas"></canvas>
      <canvas id="overlay"></canvas>
    </div>
    <div id="sidebar">
      <div id="title">bitBrush</div>
      <div id="status" aria-live="polite">
        <span id="status-dot"></span>
        <span id="status-text">connecting...</span>
      </div>
      <div id="bank">
        <span id="bank-balance">&#x2013;/&#x2013;</span> pixels
        <div id="bank-progress-bar"><div id="bank-progress-fill"></div></div>
      </div>
      <div id="coords">x: 0, y: 0</div>
      <div class="divider"></div>
      <div id="color-preview">
        <div id="color-preview-swatch"></div>
        <span id="color-preview-hex">#000000</span>
      </div>
      <div id="recent-colors"></div>
      <div class="section-label">Palette</div>
      <div id="palette" tabindex="0" role="listbox" aria-label="Color palette"></div>
      <div class="divider"></div>
      <div id="stats"></div>
      <button id="export-btn" aria-label="Export canvas as PNG">Export PNG</button>
    </div>
    <div id="footer">
    </div>
  </div>

  <!-- Mobile bottom drawer -->
  <div id="drawer" aria-label="Controls drawer">
    <div id="drawer-strip" role="button" tabindex="0" aria-expanded="false" aria-controls="drawer-content" aria-label="Toggle palette drawer">
      <span id="drawer-balance"></span>
      <span id="drawer-recent-colors"></span>
      <span id="drawer-swatch"></span>
    </div>
    <div id="drawer-progress-bar"><div id="drawer-progress-fill"></div></div>
    <div id="drawer-content">
      <!-- Populated by JS: clone of sidebar content for mobile -->
    </div>
  </div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <div id="turnstile-container" style="display:none;"></div>
  <script>
    // ── Turnstile (Cloudflare bot protection) ─────────────────────────────────
    let turnstileToken = null;
    let turnstileWidgetId = null;
    const TURNSTILE_SITE_KEY = '0x4AAAAAACwHh6lB9uQESFQA';

    function initTurnstile() {
      if (typeof turnstile !== 'undefined') {
        turnstileWidgetId = turnstile.render('#turnstile-container', {
          sitekey: TURNSTILE_SITE_KEY,
          callback: (token) => { turnstileToken = token; },
          'expired-callback': () => { turnstileToken = null; },
          'error-callback': () => { turnstileToken = null; },
          size: 'invisible'
        });
      } else {
        setTimeout(initTurnstile, 200);
      }
    }
    initTurnstile();

    function refreshTurnstile() {
      if (typeof turnstile !== 'undefined' && turnstileWidgetId != null) {
        turnstile.reset(turnstileWidgetId);
      }
    }

    function turnstileHeaders() {
      const h = { 'Content-Type': 'application/json' };
      if (turnstileToken) h['X-Turnstile-Token'] = turnstileToken;
      return h;
    }

    // ── Constants ──────────────────────────────────────────────────────────────
    const SCALE  = 2;
    const WIDTH  = 250;
    const HEIGHT = 250;

    // ── Canvas setup ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    canvas.width  = WIDTH  * SCALE;
    canvas.height = HEIGHT * SCALE;
    canvas.style.width  = (WIDTH  * SCALE) + 'px';
    canvas.style.height = (HEIGHT * SCALE) + 'px';
    canvas.style.imageRendering = 'pixelated';
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(WIDTH * SCALE, HEIGHT * SCALE);
    // Initialize alpha channel to 255 (fully opaque black)
    for (let i = 3; i < imageData.data.length; i += 4) {
      imageData.data[i] = 255;
    }
    ctx.putImageData(imageData, 0, 0);

    // ── Overlay canvas setup (screen-space, not CSS-transformed) ─────────────
    const overlay = document.getElementById('overlay');
    const overlayCtx = overlay.getContext('2d');

    // ── Dynamic container sizing (replaces fixed CONTAINER_SIZE = 500) ───────
    let containerWidth = 500;  // initial fallback, updated by ResizeObserver

    function getContainerSize() {
      return containerWidth;
    }

    function updateContainerSize() {
      const rect = container.getBoundingClientRect();
      containerWidth = Math.round(rect.width);
      overlay.width = containerWidth;
      overlay.height = containerWidth;
      overlay.style.width = containerWidth + 'px';
      overlay.style.height = containerWidth + 'px';
    }

    // ── Keyboard cursor state ────────────────────────────────────────────────
    let kbCursorX = -1, kbCursorY = -1;
    let kbMode = false;

    // ── Zoom / Pan state ─────────────────────────────────────────────────────
    const ZOOM_LEVELS = [1, 2, 4, 8, 16];
    let zoomIndex = 2;  // index into ZOOM_LEVELS, default 4x
    let zoom = ZOOM_LEVELS[zoomIndex]; // 4
    let panX = 0;  // pan offset in CSS pixels (applied to translate)
    let panY = 0;
    const container = document.getElementById('canvas-container');

    // ── ResizeObserver for fluid canvas ───────────────────────────────────────
    const resizeObserver = new ResizeObserver(entries => {
      for (const entry of entries) {
        const w = Math.round(entry.contentRect.width);
        if (w !== containerWidth && w > 0) {
          containerWidth = w;
          overlay.width = w;
          overlay.height = w;
          overlay.style.width = w + 'px';
          overlay.style.height = w + 'px';
          drawGrid();
        }
      }
    });
    resizeObserver.observe(container);

    function clampPan() {
      const containerSize = getContainerSize();
      const canvasSize = WIDTH * SCALE;
      const maxPan = containerSize / (2 * zoom);
      const minPan = -(canvasSize - containerSize / (2 * zoom));
      panX = Math.max(minPan, Math.min(maxPan, panX));
      panY = Math.max(minPan, Math.min(maxPan, panY));
    }

    function drawGrid() {
      const cs = getContainerSize();
      overlayCtx.clearRect(0, 0, cs, cs);
      if (zoom < 4) return;  // grid only at 4x and above

      overlayCtx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
      overlayCtx.lineWidth = 1;
      overlayCtx.beginPath();

      // Draw grid lines in screen space — each logical pixel boundary mapped
      // through zoom+pan to container coordinates. Lines are exactly 1 device pixel.
      for (let x = 0; x <= WIDTH; x++) {
        const sx = Math.round((x * SCALE + panX) * zoom) + 0.5;
        if (sx < 0 || sx > cs) continue;
        overlayCtx.moveTo(sx, 0);
        overlayCtx.lineTo(sx, cs);
      }
      for (let y = 0; y <= HEIGHT; y++) {
        const sy = Math.round((y * SCALE + panY) * zoom) + 0.5;
        if (sy < 0 || sy > cs) continue;
        overlayCtx.moveTo(0, sy);
        overlayCtx.lineTo(cs, sy);
      }
      overlayCtx.stroke();
      drawKeyboardCursor();
    }

    function applyTransform() {
      const t = 'scale(' + zoom + ') translate(' + panX + 'px, ' + panY + 'px)';
      canvas.style.transform = t;
      // Overlay is NOT CSS-transformed — it draws in screen space
      drawGrid();
    }

    function centerCanvas() {
      const containerSize = getContainerSize();
      const canvasSize = WIDTH * SCALE;
      panX = -(canvasSize / 2 - containerSize / (2 * zoom));
      panY = -(canvasSize / 2 - containerSize / (2 * zoom));
      clampPan();
    }

    function screenToLogical(e) {
      const rect = container.getBoundingClientRect();
      const mouseContainerX = e.clientX - rect.left;
      const mouseContainerY = e.clientY - rect.top;
      const canvasX = mouseContainerX / zoom - panX;
      const canvasY = mouseContainerY / zoom - panY;
      const lx = Math.floor(canvasX / SCALE);
      const ly = Math.floor(canvasY / SCALE);
      return {
        x: Math.max(0, Math.min(WIDTH - 1, lx)),
        y: Math.max(0, Math.min(HEIGHT - 1, ly))
      };
    }

    function updateCoordsDisplay(x, y) {
      coordsEl.textContent = 'x: ' + (x != null ? x : '?') + ', y: ' + (y != null ? y : '?') + ' (' + zoom + 'x)';
    }

    // ── Debounce utility ──────────────────────────────────────────────────
    function debounce(fn, ms) {
      let timer;
      return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), ms);
      };
    }

    // ── Relative time formatter ─────────────────────────────────────────────
    function formatRelativeTime(isoString) {
      const now = Date.now();
      const placed = new Date(isoString).getTime();
      const diffSec = Math.floor((now - placed) / 1000);
      if (diffSec < 60) return 'just now';
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return diffMin + 'm ago';
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return diffHr + 'h ago';
      const diffDay = Math.floor(diffHr / 24);
      return diffDay + 'd ago';
    }

    // ── Pixel info cache ────────────────────────────────────────────────────
    const pixelInfoCache = new Map();   // authorUuid -> { username, placedAt, authorPixels: [{x,y}] }
    const coordToAuthor = new Map();    // "x,y" string -> authorUuid
    let currentHighlightAuthor = null;  // authorUuid of currently highlighted author
    const PIXEL_INFO_CACHE_MAX = 1000;
    const COORD_AUTHOR_CACHE_MAX = 5000;

    function evictOldest(map, maxSize) {
      while (map.size > maxSize) {
        map.delete(map.keys().next().value);
      }
    }

    // ── Tooltip display functions ───────────────────────────────────────────
    function positionTooltip(tooltip, screenX, screenY) {
      let left = screenX + 12;
      let top = screenY + 8;
      if (left + 200 > window.innerWidth) {
        left = screenX - 12 - 200;
      }
      if (top + 60 > window.innerHeight) {
        top = screenY - 8 - 60;
      }
      tooltip.style.left = left + 'px';
      tooltip.style.top = top + 'px';
    }

    function showTooltipLoading(screenX, screenY) {
      const tooltip = document.getElementById('tooltip');
      const usernameEl = document.getElementById('tooltip-username');
      const timeEl = document.getElementById('tooltip-time');
      usernameEl.textContent = '...';
      usernameEl.style.color = '#ffffff';
      timeEl.textContent = '';

      tooltip.style.display = 'block';

    function showTooltip(info, screenX, screenY) {
      const tooltip = document.getElementById('tooltip');
      const usernameEl = document.getElementById('tooltip-username');
      const timeEl = document.getElementById('tooltip-time');
      const currentUser = localStorage.getItem('bitbrush_username');
      if (currentUser && info.username === currentUser) {

    function hideTooltip() {
      document.getElementById('tooltip').style.display = 'none';
      clearAuthorHighlight();
    }

    // ── Author highlight rendering ──────────────────────────────────────────
    function drawAuthorHighlight(authorPixels) {
      clearAuthorHighlight();
      if (!authorPixels || authorPixels.length === 0) return;
      // Draw 1px white outlines in screen space (not on CSS-transformed canvas)
      overlayCtx.strokeStyle = '#ffffff';
      overlayCtx.lineWidth = 1;
      const cellSize = Math.round(SCALE * zoom);
      for (const p of authorPixels) {
        const sx = Math.round((p.x * SCALE + panX) * zoom) + 0.5;
        const sy = Math.round((p.y * SCALE + panY) * zoom) + 0.5;
        overlayCtx.strokeRect(sx, sy, cellSize - 1, cellSize - 1);
      }
    }

    function clearAuthorHighlight() {
      drawGrid();
      currentHighlightAuthor = null;
    }

    // ── Keyboard cursor rendering ────────────────────────────────────────────
    function drawKeyboardCursor() {
      if (!kbMode || kbCursorX < 0 || kbCursorY < 0) return;
      const cs = getContainerSize();
      const cellSize = Math.round(SCALE * zoom);
      const sx = Math.round((kbCursorX * SCALE + panX) * zoom);
      const sy = Math.round((kbCursorY * SCALE + panY) * zoom);

      // Auto-contrast: check pixel luminance
      const pixelIdx = ((kbCursorY * SCALE) * (WIDTH * SCALE) + (kbCursorX * SCALE)) * 4;
      const r = imageData.data[pixelIdx];
      const g = imageData.data[pixelIdx + 1];
      const b = imageData.data[pixelIdx + 2];
      const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;

      overlayCtx.strokeStyle = luminance > 128 ? '#000000' : '#00cccc';
      overlayCtx.lineWidth = 2;
      overlayCtx.strokeRect(sx + 0.5, sy + 0.5, cellSize - 1, cellSize - 1);
    }

    function autoPanToKeyboardCursor() {
      const cs = getContainerSize();
      // Center the cursor pixel in the viewport
      const targetPanX = cs / (2 * zoom) - kbCursorX * SCALE - SCALE / 2;
      const targetPanY = cs / (2 * zoom) - kbCursorY * SCALE - SCALE / 2;
      panX = targetPanX;
      panY = targetPanY;
      clampPan();
      applyTransform();
    }

    // ── Debounced pixel info fetch ──────────────────────────────────────────
    let lastHoverX = -1, lastHoverY = -1;

    const debouncedFetchInfo = debounce(async (x, y, screenX, screenY) => {
      const key = x + ',' + y;
      const cachedAuthorUuid = coordToAuthor.get(key);
      if (cachedAuthorUuid && pixelInfoCache.has(cachedAuthorUuid)) {
        const cached = pixelInfoCache.get(cachedAuthorUuid);
        showTooltip(cached, screenX, screenY);
        drawAuthorHighlight(cached.authorPixels);
        currentHighlightAuthor = cachedAuthorUuid;
        return;
      }

      // Don't show loading tooltip before fetch — if the coordinate is empty (404),
      // the "..." loading state would flash briefly before being hidden.
      // Instead, only show the tooltip after we confirm pixel data exists.

      try {
        const resp = await fetch('/api/pixels/' + x + '/' + y + '/info');
        if (!resp.ok) {
          return;  // empty coordinate — show nothing
        }
        const info = await resp.json();

        pixelInfoCache.set(info.authorUuid, info);
        evictOldest(pixelInfoCache, PIXEL_INFO_CACHE_MAX);
        for (const p of info.authorPixels) {
          coordToAuthor.set(p.x + ',' + p.y, info.authorUuid);
        }
        evictOldest(coordToAuthor, COORD_AUTHOR_CACHE_MAX);

        if (lastHoverX === x && lastHoverY === y) {
          showTooltip(info, screenX, screenY);
          drawAuthorHighlight(info.authorPixels);
          currentHighlightAuthor = info.authorUuid;
        }
      } catch (err) {
        hideTooltip();
      }
    }, 300);

    // ── Palette (same order as PaletteConfig @Bean) ────────────────────────

      "#000000","#000033","#000066","#000099","#0000CC","#0000FF",

      "#006600","#006633","#006666","#006699","#0066CC","#0066FF",

      "#330000","#330033","#330066","#330099","#3300CC","#3300FF",
      "#333300","#333333","#333366","#333399","#3333CC","#3333FF",

      "#990000","#990033","#990066","#990099","#9900CC","#9900FF",
      "#993300","#993333","#993366","#993399","#9933CC","#9933FF",
