# --- Production Profile ---
# Activated by: SPRING_PROFILES_ACTIVE=prod (in fly.toml)
# Purpose: Production deployment on fly.io with PostgreSQL.

# --- PostgreSQL Database ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
# Flyway owns schema creation/evolution; Hibernate only validates entities match.
spring.jpa.hibernate.ddl-auto=validate

# --- Flyway ---
spring.flyway.enabled=true

# --- H2 Console (disabled) ---
spring.h2.console.enabled=false

# --- Logging ---
logging.level.root=INFO

# --- Actuator (minimal in prod) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
