# --- H2 Database (file-based, survives restarts) ---
spring.datasource.url=jdbc:h2:file:./data/bitbrush-dev
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA ---
# create: drops and recreates schema on each startup — prevents stale columns
# accumulating in the file-based H2 DB when entity fields are removed (ddl-auto=update
# adds columns but never removes them, causing NOT NULL violations on old columns).
spring.jpa.hibernate.ddl-auto=create
spring.flyway.enabled=false
spring.jpa.show-sql=true

# --- Logging ---
logging.level.au.com.dingwall.mark.bitbrush=DEBUG

# --- Actuator (more endpoints in dev) ---
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
