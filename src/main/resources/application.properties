spring.application.name=bitbrush
spring.profiles.active=dev

# --- BitBrush Configuration ---
bitbrush.canvas.width=250
bitbrush.canvas.height=250
bitbrush.placement.earn-rate-seconds=3
bitbrush.placement.max-banked=25
bitbrush.placement.starting-balance=5

# --- Actuator (base: health only) ---
management.endpoints.web.exposure.include=health

# --- JPA ---
spring.jpa.open-in-view=false

# --- Error handling (RFC 7807 ProblemDetail) ---
spring.mvc.problemdetails.enabled=true

# --- Turnstile (Cloudflare bot protection) ---
# Override via environment variables in production: TURNSTILE_SITE_KEY, TURNSTILE_SECRET_KEY
turnstile.site-key=${TURNSTILE_SITE_KEY:1x00000000000000000000AA}
turnstile.secret-key=${TURNSTILE_SECRET_KEY:1x0000000000000000000000000000000AA}
